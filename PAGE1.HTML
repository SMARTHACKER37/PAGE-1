<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply | Arise United Esports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0f0f13;
            color: #ffffff;
        }
        .text-accent {
            color: #ff3c00;
        }
        .bg-accent {
            background-color: #ff3c00;
        }
        .navbar-custom {
            background-color: #1a1a24;
            border-bottom: 2px solid #ff3c00;
        }
        .nav-link {
            color: #fff !important;
            font-weight: 700;
            text-transform: uppercase;
        }
        .nav-link:hover {
            color: #ff3c00 !important;
        }
        .form-container {
            background-color: #1a1a24;
            border: 1px solid #2d2d3d;
            border-radius: 8px;
            padding: 40px;
            margin-top: 40px;
            margin-bottom: 40px;
        }
        .form-control, .form-select {
            background-color: #0f0f13;
            border: 1px solid #2d2d3d;
            color: #fff;
        }
        .form-control:focus, .form-select:focus {
            background-color: #0f0f13;
            border-color: #ff3c00;
            color: #fff;
            box-shadow: none;
        }
        .form-label {
            font-weight: bold;
            color: #ccc;
        }
        .required-star {
            color: #ff3c00;
        }
        .btn-submit {
            background-color: #ff3c00;
            color: white;
            font-weight: bold;
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 5px;
            width: 100%;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background-color: #d63300;
            color: white;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="index.html">
                ARISE <span class="text-accent">UNITED</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Roster</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-accent" href="apply.html">Apply Now</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-container">
                    <div class="text-center mb-5">
                        <h2 class="fw-bold">PLAYER <span class="text-accent">APPLICATION</span></h2>
                        <p class="text-muted">Fields marked with a red asterisk (<span class="required-star">*</span>) are strictly mandatory for verification.</p>
                    </div>

                    <form action="#" method="POST" enctype="multipart/form-data">
                        
                        <div class="row mb-3">
                            <div class="col-md-8">
                                <label class="form-label">Full Legal Name <span class="required-star">*</span></label>
                                <input type="text" class="form-control" placeholder="Enter your full name" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Age <span class="required-star">*</span></label>
                                <input type="number" class="form-control" placeholder="e.g. 18" min="13" max="50" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Date of Birth <span class="required-star">*</span></label>
                                <input type="date" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email ID <span class="required-star">*</span></label>
                                <input type="email" class="form-control" placeholder="player@example.com" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">WhatsApp Number <span class="required-star">*</span></label>
                                <input type="tel" class="form-control" placeholder="+91" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Upload ID Proof (Aadhar/PAN/School ID) <span class="required-star">*</span></label>
                                <input type="file" class="form-control" accept="image/*,.pdf" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Local Address <span class="required-star">*</span></label>
                            <textarea class="form-control" rows="3" placeholder="Enter your full residential address for verification" required></textarea>
                        </div>

                        <hr style="border-color: #2d2d3d; margin: 30px 0;">
                        <h5 class="fw-bold mb-3">Gameplay Details <span class="text-muted fs-6 fw-normal">(Optional)</span></h5>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Preferred Role</label>
                                <select class="form-select">
                                    <option value="" selected disabled>Select your role...</option>
                                    <option value="igl">IGL (In-Game Leader)</option>
                                    <option value="sniper">Sniper</option>
                                    <option value="rusher">Rusher</option>
                                    <option value="support">Support</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Competitive Experience</label>
                                <textarea class="form-control" rows="1" placeholder="Past teams, T2/T3 achievements..."></textarea>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-submit mt-2">SUBMIT APPLICATION</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="text-center py-4 bg-black mt-auto">
        <p class="text-muted mb-0">&copy; 2026 Arise United Esports. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
